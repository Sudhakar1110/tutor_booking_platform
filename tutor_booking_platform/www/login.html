{% extends "templates/base.html" %}

{% block title %}Login - Tutor Booking Platform{% endblock %}

{% block content %}
<section class="section section-light" style="min-height:calc(100vh - 70px - 400px);display:flex;align-items:center;">
    <div class="container" style="max-width:440px;">
        <div class="card" style="padding:40px;">
            <div style="text-align:center;margin-bottom:30px;">
                <div style="width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,var(--primary),var(--primary-light));display:flex;align-items:center;justify-content:center;margin:0 auto 16px;color:white;font-size:1.3rem;">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <h2 style="font-size:1.4rem;font-weight:700;">Welcome Back</h2>
                <p style="color:var(--gray-500);">Login to your account</p>
            </div>

            <div id="loginAlert" style="display:none;"></div>

            <form id="loginForm" onsubmit="return handleLogin(event)">
                <div class="form-group">
                    <label>Email Address <span class="required">*</span></label>
                    <input type="email" class="form-control" id="loginEmail" name="usr" required placeholder="your@email.com" autocomplete="username">
                </div>
                <div class="form-group">
                    <label>Password <span class="required">*</span></label>
                    <input type="password" class="form-control" id="loginPassword" name="pwd" required placeholder="Enter your password" autocomplete="current-password">
                </div>
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
                    <label style="display:flex;align-items:center;gap:8px;font-size:0.85rem;color:var(--gray-600);cursor:pointer;">
                        <input type="checkbox" name="remember_me" id="rememberMe"> Remember me
                    </label>
                    <a href="/login#forgot-password" style="font-size:0.85rem;color:var(--primary);font-weight:600;">Forgot Password?</a>
                </div>
                <button type="submit" id="loginBtn" class="btn btn-primary btn-block btn-lg">
                    Login <i class="fas fa-sign-in-alt"></i>
                </button>
            </form>

            <div style="margin-top:24px;text-align:center;padding-top:24px;border-top:1px solid var(--gray-200);">
                <p style="font-size:0.9rem;color:var(--gray-500);margin-bottom:12px;">Don't have an account?</p>
                <div style="display:flex;gap:10px;">
                    <a href="/student-registration" class="btn btn-outline btn-block"><i class="fas fa-user-graduate"></i> Student</a>
                    <a href="/tutor-registration" class="btn btn-outline btn-block"><i class="fas fa-chalkboard-teacher"></i> Tutor</a>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script>
// Helper: get cookie value
function getCookie(name) {
    var value = "; " + document.cookie;
    var parts = value.split("; " + name + "=");
    if (parts.length === 2) return parts.pop().split(";").shift();
    return null;
}

// Helper: show inline alert
function showLoginAlert(type, message) {
    var alertDiv = document.getElementById('loginAlert');
    alertDiv.style.display = 'block';
    alertDiv.className = 'alert alert-' + type;
    alertDiv.innerHTML = '<i class="fas fa-' + (type === 'error' ? 'exclamation-circle' : 'check-circle') + '"></i> ' + message;
}

// Handle login form submission
function handleLogin(e) {
    if (e) e.preventDefault();

    var email = document.getElementById('loginEmail').value.trim();
    var password = document.getElementById('loginPassword').value;
    var btn = document.getElementById('loginBtn');

    if (!email || !password) {
        showLoginAlert('error', 'Please enter both email and password.');
        return false;
    }

    // Show loading
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';

    // Get CSRF token
    var csrfToken = getCookie('csrf_token');
    var formData = new URLSearchParams();
    formData.append('usr', email);
    formData.append('pwd', password);

    // Use Frappe's built-in login API via AJAX
    fetch('/api/method/login', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8',
            'X-Frappe-CSRF-Token': csrfToken || '',
            'Accept': 'application/json'
        },
        body: formData.toString(),
        credentials: 'same-origin'
    })
    .then(function(response) {
        return response.json();
    })
    .then(function(data) {
        if (data.message === "Logged In") {
            // Frappe login was successful — redirect to home_page or /app
            var dest = data.home_page || '/app';
            btn.innerHTML = '<i class="fas fa-check"></i> Redirecting...';
            window.location.href = dest;
        } else {
            // Show error from API
            btn.disabled = false;
            btn.innerHTML = 'Login <i class="fas fa-sign-in-alt"></i>';
            var errMsg = data.message || 'Invalid email or password. Please try again.';
            showLoginAlert('error', errMsg);
        }
    })
    .catch(function(err) {
        btn.disabled = false;
        btn.innerHTML = 'Login <i class="fas fa-sign-in-alt"></i>';
        showLoginAlert('error', 'Connection error. Please try again.');
        console.error('Login error:', err);
    });

    return false;
}
</script>
{% endblock %}
